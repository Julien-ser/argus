name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend – lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install fastapi uvicorn sqlmodel ruff

      - name: Lint (ruff)
        run: ruff check backend/

  backend-security:
    name: Backend – security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Scan for vulnerabilities
        # -ll  = medium + high severity only (skip low-noise info findings)
        # -x   = exclude test/migration helpers that don't run in prod
        run: bandit -r backend/ -ll --exclude backend/__pycache__

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend – build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  frontend-audit:
    name: Frontend – npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Audit dependencies (high + critical only)
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── Config & hygiene checks ────────────────────────────────────────────────
  config-checks:
    name: Config – hooks & hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate hook scripts are importable (syntax check)
        run: |
          python3 -m py_compile hooks/pre_tool.py
          python3 -m py_compile hooks/post_tool.py
          python3 -m py_compile hooks/stop.py

      - name: No hardcoded secrets or tokens
        # Match actual string assignments only; skip comment lines
        run: |
          hits=$(grep -rniE \
            "(api_key|secret_key|password|bearer [a-zA-Z0-9]{20,}|sk-[a-zA-Z0-9]{20,})\s*=\s*[\"'][^\"']{8,}[\"']" \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=dist \
            . | grep -v "^\s*#" || true)
          if [ -n "$hits" ]; then
            echo "Possible hardcoded secrets found:"
            echo "$hits"
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: No leftover debug prints in Python hooks
        run: |
          ! grep -rn "^print(" hooks/ && echo "No debug prints in hooks."

      - name: Backend – no TODO/FIXME blocking items
        # Informational: lists them but does not fail the build
        run: |
          count=$(grep -rn "TODO\|FIXME" backend/ --include="*.py" | wc -l)
          echo "Found $count TODO/FIXME comments in backend."
